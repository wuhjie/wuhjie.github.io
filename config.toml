baseURL = "https://wuhjie.github.io"
defaultContentLanguage = "en"
languageCode = "en"

title = "Hongjie Wu"

theme = "gokarna"

# Automatically generate robots.txt
enableRobotsTXT = true

[params]
    avatarURL = "/images/avatar/w.JPG"
    avatarSize = "size-l"

    description = "---"

    accentColor = "#91B493"

    socialIcons = [
        {name = "linkedin", url = "https://www.linkedin.com/in/wuhjie/"},
        {name = "instagram", url = "https://www.instagram.com/wwwwwww_uuu/"},
        {name = "email", url = "mailto:wu.hongjie@outlook.com"}    
    ]

    footer = "wuhjie"

    customHeadHTML = '''
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.css" integrity="sha384-Xi8rHCmBmhbuyyhbI88391ZKP2dmfnOl4rT9ZfRI7mLTdk1wblIUnrIq35nqwEvC" crossorigin="anonymous">
      <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.js" integrity="sha384-X/XCfMm41VSsqRNQgDerQczD69XqmjOOOwYQvr/uuC+j4OPoNhVgjdGFwhvN02Ja" crossorigin="anonymous"></script>
      <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/contrib/auto-render.min.js" integrity="sha384-+XBljXPPiv+OzfbB3cVmLHf4hdUFHlWNZN5spNQ7rmHTXpd7WvJum6fIACpNNfIR" crossorigin="anonymous"></script>
      <script>
        document.addEventListener("DOMContentLoaded", function() {
          renderMathInElement(document.body, {
            // customised options
            // • auto-render specific keys, e.g.:
            delimiters: [
              {left: '$$', right: '$$', display: true},
              {left: '$', right: '$', display: false},
            ],
            // • rendering keys, e.g.:
            throwOnError : false
          });
        });
      </script>
    '''


[menu]
  [[menu.main]]
    # Unique identifier for a menu item
    identifier = "posts"

    url = "/posts/"
    
    # You can add extra information before the name (HTML format is supported), such as icons
    pre = ""

    # You can add extra information after the name (HTML format is supported), such as icons
    post = ""

    # Display name
    name = "Posts"

    # Weights are used to determine the ordering
    weight = 1

  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 2

  [[menu.main]]
    identifier = "aboutme"
    name = "About me"
    url = "/wuhjie/"
    weight = 3
  
    

[markup]
  [markup.tableOfContents]
    startLevel = 1
    endLevel = 3
    ordered = false